name: Publish to ClawHub

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Authenticate
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}" --no-browser

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog from tag annotation
        id: changelog
        run: |
          MSG=$(git tag -l --format='%(contents:subject)' "$GITHUB_REF_NAME" 2>/dev/null || true)
          if [ -z "$MSG" ] || [ "$MSG" = "$GITHUB_REF_NAME" ]; then
            MSG=$(git log -1 --format='%s')
          fi
          echo "text=$MSG" >> "$GITHUB_OUTPUT"

      - name: Publish to ClawHub
        run: |
          clawhub package publish . \
            --family code-plugin \
            --name parcel-cli \
            --display-name Parcel \
            --version "${{ steps.version.outputs.version }}" \
            --changelog "${{ steps.changelog.outputs.text }}" \
            --tags "latest" \
            --source-repo "${{ github.repository }}" \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ github.ref_name }}"

      - name: Verify
        run: clawhub package inspect parcel-cli
