name: Version Consistency

on:
  push:
    branches: [main]
  pull_request:

jobs:
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: omarshahine/version-consistency-action@v1
        with:
          sets: |
            - name: "Parcel plugin"
              sources:
                - package.json:.version
                - marketplace.json:.plugins[0].version
